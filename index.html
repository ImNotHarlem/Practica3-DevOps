<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f2c;
    color:white;
    scroll-behavior:smooth;
}

/* HERO */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h1{
    font-size:4rem;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
}

/* NAV */
nav{
    position:sticky;
    top:0;
    background:#000;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
}

/* SECTIONS */
section{
    padding:60px 20px;
    max-width:1200px;
    margin:auto;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1a1f4a;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.2);
}

.card:hover{
    transform:translateY(-10px);
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    font-size:2rem;
}

/* ANIMACIÓN */
.fade{
    opacity:0;
    transform:translateY(20px);
    transition:1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

footer{
    background:black;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>⚽ Mundial 2026</h1>
</div>

<nav>
    <a href="#info">Info</a>
    <a href="#galeria">Galería</a>
    <a href="#contador">Cuenta atrás</a>
</nav>

<section id="info" class="fade">
<h2>🌎 Sobre el Mundial</h2>
<p>El Mundial 2026 será el más grande de la historia con 48 equipos y 3 países anfitriones.</p>
</section>

<section id="galeria" class="fade">
<h2>🔥 Galería</h2>

<div class="cards">
<div class="card">
<img src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1508098682722-e99c643e7f0b">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20">
</div>
</div>

</section>

<section id="contador" class="fade">
<h2>⏳ Cuenta regresiva</h2>
<div class="countdown" id="countdown"></div>
</section>

<footer>
<p>DevOps Project - Harlem Josue</p>
</footer>

<script>
// COUNTDOWN
const countdown = document.getElementById("countdown");
const targetDate = new Date("June 8, 2026").getTime();

setInterval(()=>{
    const now = new Date().getTime();
    const diff = targetDate - now;

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

    countdown.innerHTML = days + " días " + hours + " horas";
},1000);

// SCROLL ANIMATION
const elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{
    elements.forEach(el=>{
        const position = el.getBoundingClientRect().top;
        const screen = window.innerHeight;

        if(position < screen - 100){
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>
